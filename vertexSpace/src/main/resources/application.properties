spring.application.name=vertexspace-backend

spring.datasource.url=jdbc:postgresql://localhost:5432/vertexspace_db
spring.datasource.username=postgres
spring.datasource.password=mypassword
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

jwt.secret=kartikjaju_keyishereforcheckingpurposeonlysothekeysizeshouldbetolarge
jwt.expiration=86400000

logging.level.com.vertexspace=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.syntaxHighlight.activated=true
 springdoc.api-docs.path=/v3/api-docs
 springdoc.packages-to-scan=com.example.vertexSpace.controller
 springdoc.paths-to-match=/api/v1/**
springdoc.swagger-ui.persistAuthorization=true
